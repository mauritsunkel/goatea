name: Update Bioc Badge

on:
  schedule:
    # Runs at 05:00 UTC on the 4th of every month
    - cron: '0 5 4 * *' 
  workflow_dispatch:      # Allows you to run it manually

jobs:
  update-readme:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
        
      - name: Install dependencies
        run: |
          install.packages("badger", dependencies = TRUE)
          if (!requireNamespace("badger", quietly = TRUE)) stop("badger failed to install")
        shell: Rscript {0}

      - name: Generate Badge and Update README
        run: |
          library(badger)
          
          # 1. Generate the badge
          # Using GOATEA as the target
          new_badge <- badge_bioc_download("goatea", by = "total", color = "white", type = "total")
          print(paste("Generated badge:", new_badge))
          
          # 2. Read and Update README
          readme <- readLines("README.md")
          
          start_tag <- "<!-- badge: bioc-downloads -->"
          end_tag   <- "<!-- badges: end -->"
          
          start_idx <- grep(start_tag, readme, fixed =  TRUE)
          end_idx   <- grep(end_tag, readme, fixed = TRUE)
          
            if(length(start_idx) == 1 && length(end_idx) == 1) {
            # Construct the new content: 
            # Everything before start + the start tag + the badge + the end tag + everything after
            updated_readme <- c(
              readme[1:(start_idx - 1)],
              new_badge,
              end_tag,
              readme[(end_idx + 1):length(readme)]
            )
            writeLines(updated_readme, "README.md")
            print("Successfully injected badge between headers.")
          } else {
            stop("Check your tags! Tags not found or duplicated.")
          }
        shell: Rscript {0}

      - name: Commit changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add README.md
          git commit -m "Update Bioconductor download stats" || echo "No changes to commit"
          git push